<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cadastro de Produto</title>

</head>

<body>

<div class="container">

    <h1>Cadastro de Produto</h1>

    <form th:action="@{/salvarProduto}" th:object="${produto}" method="post">

        <label>DESCRIÇÃO</label>
        <input type="text" th:field="*{nomeProduto}">
        <br>

        <label>DT. COMPRA</label>
        <input type="date" th:field="*{dataCompra}">
        <br>

        <label>DT. VALIDADE</label>
        <input type="date" th:field="*{dataValidade}">
        <br>
        
        <label>UND.</label>
    	<input type="text" th:field="*{unidadeMedida}">
    	<br>
    	
    	<label>QTI. ENTRADAS</label>
    	<input type="number" step="0.01" th:field="*{quantEntradas}">
    	<br>
    	
    	<label>QTI. SAÍDAS</label>
    	<input type="number" step="0.01" th:field="*{quantSaidas}">
    	<br><br>
    	
    	 
        <button type="submit">Salvar</button>

    </form>

    <a href="listaProdutos" class="voltar">Voltar</a>

</div>

</body>

</html>
